name: ESG Coleta - CI Pipeline

on:
  push:                    # dispara em qualquer branch ao fazer push
    branches: [ "**" ]
  pull_request:            # dispara em qualquer PR
    branches: [ "**" ]
  workflow_dispatch:       # permite executar manualmente pela aba Actions do GitHub

jobs:
  build-and-test:
    name: 🧪 Build e Testes Automatizados
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache de dependências Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔨 Compilar projeto
        run: mvn clean compile -B

      - name: ✅ Executar todos os testes (BDD + API)
        run: mvn test -B

      - name: 📊 Publicar relatório JUnit no GitHub
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Relatório de Testes JUnit
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: 🥒 Upload relatório Cucumber HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-reports
          path: target/cucumber-reports/
          retention-days: 30

      - name: 📦 Gerar JAR final
        run: mvn package -DskipTests -B

      - name: 📤 Upload do artefato JAR
        uses: actions/upload-artifact@v4
        with:
          name: esg-coleta-app
          path: target/*.jar
          retention-days: 7

  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Build da imagem Docker
        run: docker build -t esg-coleta-residuos:latest .

      - name: 🔍 Verificar imagem criada
        run: docker images esg-coleta-residuos
