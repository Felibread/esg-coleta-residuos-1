version: '3.8'

services:
  app:
    build: .
    container_name: esg-coleta-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/pontos-coleta"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  test-runner:
    build: .
    container_name: esg-coleta-tests
    volumes:
      - ./target:/app/target
    command: >
      sh -c "mvn test -B"
    depends_on:
      app:
        condition: service_healthy
    profiles:
      - test
